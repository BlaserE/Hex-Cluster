apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  # Pin to a specific ArgoCD release; check https://github.com/argoproj/argo-cd/releases for latest
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
namespace: argocd
patches:
  # Run argocd-server in HTTP mode so Traefik can terminate TLS at the Ingress layer
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
        namespace: argocd
      data:
        server.insecure: "true"
