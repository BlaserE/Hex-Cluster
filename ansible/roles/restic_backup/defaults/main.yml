---
restic_backup_paths: []         # override in host_vars
restic_b2_bucket: ""            # override in host_vars
restic_timer: "02:30"           # OnCalendar time, daily
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 3

# Secrets — set in host secrets.yml
restic_password: ""
restic_b2_account_id: ""
restic_b2_account_key: ""

restic_env_file: /etc/restic/gateway.env
restic_pre_backup_script: /etc/restic/pre-backup.sh