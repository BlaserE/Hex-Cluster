---
# roles/headscale/defaults/main.yml

headscale_version: "0.28.0"
headscale_domain: "headscale.yourdomain.com"
headscale_base_domain: "ts.yourdomain.com"
headscale_port: 443
headscale_derp_stun_port: 3478

# Tailscale address space — defaults are the standard ranges
headscale_ip4_prefix: "100.64.0.0/10"
headscale_ip6_prefix: "fd7a:115c:a1e0::/48"

# DERP — keep Tailscale's public servers as fallback
headscale_derp_urls:
  - https://controlplane.tailscale.com/derpmap/default
