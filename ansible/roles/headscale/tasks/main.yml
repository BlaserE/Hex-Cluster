---
- name: Download Headscale deb package
  ansible.builtin.get_url:
    url: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}/headscale_{{ headscale_version }}_linux_arm64.deb"
    dest: "/tmp/headscale_{{ headscale_version }}.deb"
    mode: "0644"
  tags: ["headscale", "packages"]

- name: Install Headscale deb package
  ansible.builtin.apt:
    deb: "/tmp/headscale_{{ headscale_version }}.deb"
    state: present
  tags: ["headscale", "packages"]

- name: Deploy Headscale config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/headscale/config.yaml
    owner: headscale
    group: headscale
    mode: "0640"
  notify: Restart Headscale
  tags: ["headscale", "config"]

- name: Deploy Headscale ACL policy
  ansible.builtin.template:
    src: acl.json.j2
    dest: /etc/headscale/acl.json
    owner: headscale
    group: headscale
    mode: "0640"
  notify: Restart Headscale
  tags: ["headscale", "config", "acl"]

- name: Enable and start Headscale
  ansible.builtin.systemd:
    name: headscale
    enabled: true
    state: started
  tags: ["headscale"]

- name: Allow DERP STUN through UFW
  community.general.ufw:
    rule: allow
    port: "{{ headscale_derp_stun_port }}"
    proto: udp
  tags: ["headscale", "firewall"]

- name: Allow Port 80 through UFW for ACME
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  tags: ["headscale", "firewall"]

- name: Allow HTTPS through UFW for Headscale
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  tags: ["headscale", "firewall"]