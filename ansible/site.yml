# The ultimate executable.
# This is the source of truth for the Ansible configuration.
# It will configure the designated hosts

---
- name: Testing Machine Cluster.
  hosts: metal
  tasks:
    - name: Pinging The Cluster.
      ansible.builtin.ping:

    - name: Hello World.
      ansible.builtin.debug:
        msg: "Hello World"

- name: Physical Hardware Baseline
  hosts: metal
  become: true
  tasks:
    - name: Update system
      ansible.builtin.apt:
        update_cache: true

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - vim
          - ufw
          - htop
          - git
          - curl
        state: present

# Play 1: Common baseline for every machine in the lab
- name: Apply security hardening to all nodes
  hosts: all
  become: true
  roles:
    - role: hardening
      tags: ['security']

# Play 2: Storage-specific logic
- name: Configure ZFS storage nodes
  hosts: storage
  become: true
  roles:
    - role: zfs
      tags: ['storage']

# Play 3: Infrastructure and Compute logic
- name: Setup Database and K3s Cluster
  hosts: compute
  become: true
  vars_files:
    - secrets/passwords.yml
  roles:
    - role: sql_server
      tags: ['kubernetes', 'sql_prep']

    - role: k3s
      tags: ['kubernetes', 'k3s_prep']
