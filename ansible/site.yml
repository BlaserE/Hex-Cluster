# The ultimate executable.
# This is the source of truth for the Ansible configuration.
# It will configure the designated hosts

---


- name: Physical Hardware Baseline
  hosts: metal
  become: true
  tasks:
    - name: Update system
      ansible.builtin.apt:
        update_cache: true

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - vim
          - ufw
          - htop
          - git
          - curl
        state: present

- name: Gateway Baseline
  hosts: gateway
  become: true
  tasks:
    - name: Update system
      ansible.builtin.apt:
        update_cache: true

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - vim
          - ufw
          - htop
          - git
          - curl
        state: present

- name: Apply security hardening to all nodes
  hosts: all
  become: true
  roles:
    - role: hardening
      tags: ["security"]

- name: Setup Basic Monitoring
  hosts: metal
  become: true
  roles:
    - role: monitoring
      tags: ["monitoring"]

- name: Configure ZFS storage nodes
  hosts: storage
  become: true
  roles:
    - role: zfs
      tags: ["zfs", "storage"]

    - role: zfs_snapshots
      tags: ["zfs", "snapshots", "storage"]

    - role: storage
      tags: ["storage", "zfs", "csi"]

- name: Setup Database
  hosts: compute
  become: true
  vars_files:
    - secrets/passwords.yml
  roles:
    - role: sql_server
      tags: ["kubernetes", "sql_prep", "sql"]

- name: Setup K3s cluster
  hosts: compute
  become: true
  roles:
    - role: k3s
      tags: ["kubernetes", "k3s_prep"]

- name: Configure gateway VPS
  hosts: gateway
  become: true
  vars_files:
    - host_vars/gateway-1/secrets.yml
  roles:
    - role: docker
      tags: ["docker"]

    - role: wg_gateway
      tags: ["wireguard"]

    - role: headscale
      tags: ["headscale"]

    - role: haproxy_sni
      tags: ["haproxy"]

    - role: crowdsec
      tags: ["crowdsec"]

    - role: restic_backup
      tags: ["restic"]